<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - TechCon 2024</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header Section -->
  <header>
    <h1>Contact Us</h1>
    <!-- Navigation Menu -->
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content Section -->
  <main>
    <section>
      <h2>Contact Information</h2>
      
      <!-- Email Address -->
      <p>Email us at: <a href="mailto:contact@techcon2024.com">contact@techcon2024.com</a></p>
      
      <!-- Social Media Links -->
      <p>Follow us on:</p>
      <ul>
        <li><a href="https://twitter.com/TechCon2024" target="_blank">Twitter</a></li>
        <li><a href="https://facebook.com/TechCon2024" target="_blank">Facebook</a></li>
        <li><a href="https://linkedin.com/company/TechCon2024" target="_blank">LinkedIn</a></li>
      </ul>
      
      <!-- Embedded Google Map -->
      <h3>Conference Location</h3>
      <iframe src="https://www.google.com/maps/embed?pb=..." width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <!-- Contact Us Form -->
    <section>
      <h2>Send Us a Message</h2>
      <form action="submit_message.php" method="POST">
        <!-- Name Field -->
        <div>
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" required placeholder="Your full name">
        </div>

        <!-- Email Field -->
        <div>
          <label for="email">Email Address:</label>
          <input type="email" id="email" name="email" required placeholder="Your email address">
        </div>

        <!-- Message Field -->
        <div>
          <label for="message">Message:</label>
          <textarea id="message" name="message" required placeholder="Your message"></textarea>
        </div>

        <!-- Submit Button -->
        <div>
          <button type="submit">Send Message</button>
        </div>
      </form>
    </section>
  </main>

  <!-- Footer Section -->
  <footer>
    <p>&copy; 2024 TechCon. All rights reserved.</p>
  </footer>
</body>
</html>
